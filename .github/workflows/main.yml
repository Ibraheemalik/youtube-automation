name: YouTube Automation Production

on:
  schedule:
    - cron: '0 23 * * 1-6'
    - cron: '0 15 * * 0'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Python setup
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. System dependencies
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # 4. Python dependencies (UPDATED VERSIONS)
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            edge-tts>=7.2.0 \
            google-generativeai>=0.8.0 \
            google-api-python-client>=2.100.0 \
            google-auth-httplib2>=0.2.0 \
            google-auth-oauthlib>=1.1.0 \
            moviepy>=2.0.0 \
            Pillow>=10.0.0 \
            numpy>=1.24.0 \
            requests>=2.31.0 \
            pyyaml>=6.0.0 \
            pytz>=2023.3 \
            scipy>=1.11.0 \
            imageio>=2.31.0 \
            imageio-ffmpeg>=0.4.9 \
            python-dotenv

      # 5. Create folders
      - name: Create Folders
        run: |
          mkdir -p output
          mkdir -p temp

      # 6. Environment setup
      - name: Create Environment File
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "PIXABAY_API_KEY=${{ secrets.PIXABAY_API_KEY }}" >> .env
          echo "YT_CLIENT_ID=${{ secrets.YT_CLIENT_ID }}" >> .env
          echo "YT_CLIENT_SECRET=${{ secrets.YT_CLIENT_SECRET }}" >> .env
          echo "YT_REFRESH_TOKEN=${{ secrets.YT_REFRESH_TOKEN }}" >> .env

      # 7. Run script
      - name: Run Production Script
        run: python youtube-automation/main.py
        env:
          PYTHONPATH: ${{ github.workspace }}/youtube-automation

      # 8. Upload output
      - name: Upload Finished Video
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video
          path: output/

      # 9. Upload logs if failed
      - name: Upload Logs (if failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: .
