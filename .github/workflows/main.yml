name: YouTube Automation Production

on:
  schedule:
    # 1. Weekday Production (Mon-Sat at 23:00 UTC / 6 PM EST)
    - cron: '0 23 * * 1-6'
    
    # 2. Sunday Special (Sunday at 15:00 UTC / 10 AM EST for longer deep-dives)
    - cron: '0 15 * * 0'
    
  workflow_dispatch: # Allows manual run for testing

jobs:
  build:
    runs-on: ubuntu-latest
    # Timeout set to 3 hours to handle 25-minute video rendering
    timeout-minutes: 180 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai google-api-python-client google-auth-oauthlib \
                      requests moviepy Pillow numpy edge-tts python-dotenv

      - name: Create Folders
        run: |
          mkdir -p output
          mkdir -p temp

      - name: Create Environment File
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "PIXABAY_API_KEY=${{ secrets.PIXABAY_API_KEY }}" >> .env

      - name: Run Production Script
        # Direct path to your folder
        run: python youtube-automation/main.py 
        env:
          PYTHONPATH: ${{ github.workspace }}/youtube-automation

      - name: Upload Finished Video as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-output-${{ github.run_id }}
          path: output/
          retention-days: 7
