name: True Crime YouTube Auto-Bot

on:
  # MANUAL RUN TRIGGER (From GitHub Actions UI)
  workflow_dispatch:
    inputs:
      custom_title:
        description: 'Custom Title (Leave blank for auto-generation)'
        required: false
        default: ''

  # SCHEDULER TRIGGER (EST Timings converted to UTC)
  schedule:
    - cron: '0 13 * * 1' # Monday 9:00 AM EST
    - cron: '0 13 * * 2' # Tuesday 9:00 AM EST
    - cron: '0 14 * * 3' # Wednesday 10:00 AM EST
    - cron: '0 17 * * 4' # Thursday 1:00 PM EST
    - cron: '0 16 * * 5' # Friday 12:00 PM EST
    - cron: '0 14 * * 6' # Saturday 10:00 AM EST
    - cron: '0 14 * * 0' # Sunday 10:00 AM EST

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          # Fix ImageMagick security policy to allow PDF/Text operations
          sudo sed -i 's/domain="path" rights="none" pattern="@\*"/domain="path" rights="read|write" pattern="@\*"/g' /etc/ImageMagick-6/policy.xml

      - name: Install Python Requirements
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai \
                      moviepy==1.0.3 \
                      edge-tts \
                      requests \
                      python-dotenv \
                      pillow \
                      schedule \
                      google-api-python-client \
                      google-auth-httplib2 \
                      google-auth-oauthlib

      - name: Create API Keys & Tokens from Secrets
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          echo "$YOUTUBE_TOKEN_JSON" > token.json

      - name: Run True Crime Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          CUSTOM_TITLE: ${{ github.event.inputs.custom_title }}
        run: |
          python main.py
