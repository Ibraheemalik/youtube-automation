name: YouTube Automation Production

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai google-api-python-client google-auth-oauthlib \
                      requests moviepy PIL numpy edge-tts python-dotenv

      - name: Create Environment File
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "PIXABAY_API_KEY=${{ secrets.PIXABAY_API_KEY }}" >> .env

      - name: Run Production Script
        # CRITICAL: Path must match your folder structure
        run: python youtube-automation/main.py 
        env:
          PYTHONPATH: ${{ github.workspace }}/youtube-automation

      - name: Upload Finished Video as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: viral-video-output
          path: output/
          retention-days: 7
