name: daily_grind_pipeline

on:
  schedule:
    - cron: "0 14 * * *"   # 7:00 PM PKT (UTC+5)
  workflow_dispatch:

jobs:
  run_pipeline:
    runs-on: ubuntu-latest

    steps:
      # ================= CODE =================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ================= PYTHON =================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ================= DEPENDENCIES =================
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install moviepy requests google-api-python-client google-auth google-auth-oauthlib google-auth-httplib2

      # ================= FFmpeg =================
      - name: Install FFmpeg
        run: |
          sudo apt update
          sudo apt install ffmpeg -y

      # ================= RUN PIPELINE =================
      - name: Run AI Content Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          python run.py

      # ================= BACKUP OUTPUT =================
      - name: Upload video backup
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video
          path: final_output.mp4
